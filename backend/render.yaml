services:
  - type: web
    name: animal-tracker-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: JWT_SECRET
        value: govt-livestock-secret-2024-secure
      - key: DATABASE_URL
        fromDatabase:
          name: animal-tracker-db
          property: connectionString

databases:
  - name: animal-tracker-db
    plan: free
